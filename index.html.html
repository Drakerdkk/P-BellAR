<!DOCTYPE html>
<html>
<head>
    <title>PBellARModel</title>

    <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>

    <style>
        body {
            margin: 0;
            background: #000;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

<model-viewer
    src="PBellARModel.glb"
    alt="PBell AR Model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    camera-orbit="0deg 75deg 105%"
    bounds="tight"
    scale="0.5 0.5 0.5">
</model-viewer>

</body>
</html>
